services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-echoim}
      POSTGRES_USER: ${POSTGRES_USER:-echoim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  server:
    build: ./server
    restart: unless-stopped
    profiles: [deploy]
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-echoim}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-echoim}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      INVITE_CODES: ${INVITE_CODES:-}
      REDIS_URL: redis://redis:6379
      PORT: 3000
    ports:
      - "${SERVER_PORT:-3000}:3000"

  client:
    build: ./client
    restart: unless-stopped
    profiles: [deploy]
    depends_on:
      - server
    ports:
      - "${CLIENT_PORT:-80}:80"

volumes:
  postgres-data:
  redis-data:
