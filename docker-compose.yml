services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-echoim}
      POSTGRES_USER: ${POSTGRES_USER:-echoim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  server:
    build: ./server
    restart: unless-stopped
    profiles: [deploy]
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-echoim}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-echoim}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      PORT: 3000
    ports:
      - "${SERVER_PORT:-3000}:3000"

  client:
    build: ./client
    restart: unless-stopped
    profiles: [deploy]
    depends_on:
      - server
    ports:
      - "${CLIENT_PORT:-80}:80"

volumes:
  postgres-data:
