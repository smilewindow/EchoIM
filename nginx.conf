upstream echoim_backend {
    # 轮询两个后端实例；WebSocket 消息依赖 Redis Pub/Sub 跨实例投递，
    # 因此无需会话粘性。
    server server-1:3000;
    server server-2:3000;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# 自定义日志格式：加上 upstream 字段，便于阶段 7 验证时确认每个请求
# （包括 WS 升级的 HTTP 101）落在哪个后端实例上。
log_format echoim_upstream '$remote_addr [$time_local] "$request" '
                           '$status body=$body_bytes_sent '
                           'upstream=$upstream_addr '
                           'rt=$request_time urt=$upstream_response_time';

server {
    listen 3000;
    server_name _;

    # server block 内重新声明 access_log，覆盖 nginx:alpine 自带的 http-level
    # 默认 access_log（main 格式），否则每条请求会被记两次。
    access_log /var/log/nginx/access.log echoim_upstream;

    # HTTP REST + WebSocket 都经过同一个 location
    location / {
        proxy_pass http://echoim_backend;
        proxy_http_version 1.1;

        # WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 常规代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 长连接：避免 nginx 默认 60s 空闲超时踢掉连接
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
